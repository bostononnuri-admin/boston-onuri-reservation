<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 110" width="160" height="110">

  <!-- ══ TABLE ══ -->
  <!-- tabletop -->
  <rect x="45" y="36" width="72" height="10" rx="5" fill="#e8c88a"/>
  <!-- edge shadow -->
  <rect x="45" y="43" width="72" height="5" rx="0" fill="#c8a96e"/>
  <!-- left leg -->
  <rect x="52" y="48" width="7" height="38" rx="3.5" fill="#c8a96e"/>
  <!-- right leg -->
  <rect x="103" y="48" width="7" height="38" rx="3.5" fill="#c8a96e"/>
  <!-- crossbar -->
  <rect x="52" y="70" width="58" height="5" rx="2.5" fill="#b8976a"/>

  <!-- ══ FOOD ON TABLE ══ -->

  <!-- plate left — with steak/main dish -->
  <ellipse cx="67" cy="40" rx="10" ry="4" fill="#f0f0f0" opacity="0.95"/>
  <ellipse cx="67" cy="40" rx="7.5" ry="2.8" fill="#e8e0d8"/>
  <!-- steak on plate -->
  <ellipse cx="67" cy="39.5" rx="5" ry="2" fill="#8b3a1a"/>
  <ellipse cx="66" cy="39" rx="3" ry="1.2" fill="#a04422"/>
  <!-- grill marks -->
  <path d="M64 39 Q65.5 38.5 67 39" stroke="#6b2a0a" stroke-width="0.6" fill="none"/>
  <!-- garnish green -->
  <ellipse cx="70" cy="38.5" rx="1.5" ry="0.8" fill="#5a9e3a"/>

  <!-- plate right — with pasta/noodles -->
  <ellipse cx="96" cy="40" rx="10" ry="4" fill="#f0f0f0" opacity="0.95"/>
  <ellipse cx="96" cy="40" rx="7.5" ry="2.8" fill="#e8e0d8"/>
  <!-- pasta swirl -->
  <path d="M91 40 Q93 38 96 39.5 Q99 41 101 39" stroke="#e8c060" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M92 40.8 Q94.5 39 97 40.5 Q99 41.5 100 40.5" stroke="#d4a840" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- tomato sauce dots -->
  <circle cx="94" cy="39.5" r="1" fill="#e03030" opacity="0.85"/>
  <circle cx="98" cy="40.5" r="0.8" fill="#e03030" opacity="0.85"/>

  <!-- center — bread basket -->
  <ellipse cx="81" cy="39" rx="7" ry="2.8" fill="#c8a050" opacity="0.9"/>
  <ellipse cx="79" cy="38.2" rx="3" ry="2" fill="#e8b860"/>
  <ellipse cx="83" cy="38.5" rx="2.5" ry="1.8" fill="#daa840"/>
  <ellipse cx="81" cy="37.5" rx="2" ry="1.5" fill="#f0c870"/>
  <!-- sesame dots on bread -->
  <circle cx="79" cy="37.8" r="0.4" fill="#c89030"/>
  <circle cx="80.5" cy="37.2" r="0.3" fill="#c89030"/>
  <circle cx="83" cy="38" r="0.4" fill="#b87828"/>

  <!-- wine glass left -->
  <path d="M57 36 L60 36 L59 40 L58 40 Z" fill="#f8d0d0" opacity="0.85"/>
  <path d="M56.5 36 L60.5 36" stroke="#c8a0a0" stroke-width="0.8" stroke-linecap="round"/>
  <rect x="58" y="40" width="0.8" height="4" fill="#c0a0a0"/>
  <path d="M56.5 44 L61 44" stroke="#c0a0a0" stroke-width="1" stroke-linecap="round"/>
  <!-- wine color -->
  <path d="M57.3 38 L59.7 38 L59.2 40 L57.8 40 Z" fill="#c03030" opacity="0.6"/>

  <!-- wine glass right -->
  <path d="M102 36 L105 36 L104 40 L103 40 Z" fill="#f8d0d0" opacity="0.85"/>
  <path d="M101.5 36 L105.5 36" stroke="#c8a0a0" stroke-width="0.8" stroke-linecap="round"/>
  <rect x="103" y="40" width="0.8" height="4" fill="#c0a0a0"/>
  <path d="M101.5 44 L106 44" stroke="#c0a0a0" stroke-width="1" stroke-linecap="round"/>
  <path d="M102.3 38 L104.7 38 L104.2 40 L102.8 40 Z" fill="#c03030" opacity="0.6"/>

  <!-- candle center top -->
  <rect x="80" y="30" width="3" height="6" rx="1" fill="#fff8e0"/>
  <rect x="80" y="33" width="3" height="3" rx="0.5" fill="#f0e0b0"/>
  <!-- flame -->
  <ellipse cx="81.5" cy="29.5" rx="1.2" ry="1.8" fill="#ffa020" opacity="0.9"/>
  <ellipse cx="81.5" cy="29" rx="0.6" ry="1" fill="#fff060" opacity="0.95"/>


  <!-- ══ CHAIR LEFT (80%, mid distance) ══ -->
  <rect x="17" y="46" width="5" height="22" rx="2.5" fill="#a0785a"/>
  <rect x="17" y="60" width="27" height="5" rx="2.5" fill="#a0785a"/>
  <rect x="17" y="64" width="27" height="2" rx="0" fill="#8b6347"/>
  <rect x="40" y="65" width="4" height="22" rx="2" fill="#8b6347"/>
  <rect x="18" y="65" width="4" height="22" rx="2" fill="#8b6347"/>
  <rect x="18" y="76" width="26" height="3" rx="1.5" fill="#7a5538"/>

  <!-- ══ CHAIR RIGHT (80%, mid distance) ══ -->
  <rect x="140" y="46" width="5" height="22" rx="2.5" fill="#a0785a"/>
  <rect x="118" y="60" width="27" height="5" rx="2.5" fill="#a0785a"/>
  <rect x="118" y="64" width="27" height="2" rx="0" fill="#8b6347"/>
  <rect x="118" y="65" width="4" height="22" rx="2" fill="#8b6347"/>
  <rect x="141" y="65" width="4" height="22" rx="2" fill="#8b6347"/>
  <rect x="118" y="76" width="26" height="3" rx="1.5" fill="#7a5538"/>

</svg>
